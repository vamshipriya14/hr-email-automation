name: HR Email Monitor

on:
  # Run every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  monitor-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore processed emails cache
        uses: actions/cache/restore@v4
        with:
          path: data/processed_emails.json
          key: processed-emails-${{ github.run_number }}
          restore-keys: |
            processed-emails-

      - name: Run email monitor
        env:
          # Azure AD credentials
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GROUP_ID: ${{ secrets.GROUP_ID }}

          # Database credentials
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Run once (not continuous mode)
          # GitHub Actions will re-run this every 5 minutes via cron
          python src/email_monitor.py --max-emails 50

      - name: Save processed emails cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/processed_emails.json
          key: processed-emails-${{ github.run_number }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: |
            data/processed_emails.json
            *.log
          retention-days: 7
